<!DOCTYPE html>
<html>
<head>
    <title>Call Logs Dashboard</title>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
            background: #f5f6fa;
        }

        h2 {
            color: #2f3640;
        }

        button {
            padding: 12px 25px;
            background: #273c75;
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        button:hover {
            background: #192a56;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #40739e;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .answered {
            color: green;
            font-weight: bold;
        }

        .not-answered {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>📞 Amar Eye Yoga Ai Agent Call Logs Dashboard</h2>

<button onclick="getCallLogs()">Load Call Logs</button>

<table id="table">
    <thead>
        <tr>
            <th>Number</th>
            <th>Status</th>
            <th>Duration</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
async function getCallLogs() {
    try {
        const res = await fetch("/call-logs"); // ✅ same server
        const response = await res.json();

        let calls = response.data || [];

        const tbody = document.querySelector("#table tbody");
        tbody.innerHTML = "";

        calls.forEach(call => {
            const row = document.createElement("tr");

            const statusClass = call.call_status === "Call Answered"
                ? "answered"
                : "not-answered";

            row.innerHTML = `
                <td>${call.called_to || "N/A"}</td>
                <td class="${statusClass}">${call.call_status}</td>
                <td>${call.call_duration}s</td>
                <td>${call.called_time}</td>
            `;

            tbody.appendChild(row);
        });

    } catch (error) {
        console.error(error);
        alert("Error fetching data");
    }
}
</script>

</body>
</html>
